version: 2
updates:
  # Python dependencies (uv: pyproject.toml + uv.lock)
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
      include: scope
    # One grouped PR for all minor/patch bumps; majors stay separate.
    groups:
      uv:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI workflow
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
      include: scope
    # One grouped PR for every bump, majors included.
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - major
          - minor
          - patch
